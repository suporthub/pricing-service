name: ci

on:
  push:
    branches: [main, master, develop]

jobs:
  deploy-to-k3s:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy securely over SSH (Direct Build)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /v3/pricing-service
            
            # Force server to match GitHub exactly
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            
            # Build the fresh local image natively (no-cache to ensure updates)
            docker build --no-cache -t pricing-service:local .
            
            # Save and import it directly into the cluster runtime
            docker save pricing-service:local | sudo k3s ctr images import -
            
            # Ensure the deployment manifest matches the repo
            kubectl apply -f /v3/k8s/pricing-service-deployment.yaml
            
            # Restart deployment
            kubectl rollout restart deployment/pricing-service -n default
